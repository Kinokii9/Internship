<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live DOM UI</title>
<style>
    body {
        font-family: 'Times New Roman', Times, serif;
        background: linear-gradient(to right, #e0eafc, #cfdef3);
        margin: 20;
        padding: 20px;
    }
    *{
        padding: auto;
        margin:auto;
        
    }

    .container {
        display: flex;
        justify-content: center;
        gap: 100px;
        background:#76c4bd;
        max-width: 800px;
        padding: 30px;
        margin: auto;
        margin-top: 100px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(163, 148, 148, 0.1);
    }

    .left, .right {
        flex: 1;
    }

    h2 {
        margin-bottom: 40px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input[type="text"],
    input[type="number"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    input[type="checkbox"] {
        margin-top: 10px;
        transform: scale(1.2);
    }

    input[type="color"] {
        margin-top: 10px;
        width: 60px;
        height: 35px;
        border: none;
    }

    .card {
        background: #83d7e8;
        color: #000;
        padding: 30px;
        border-radius: 15px;
        width: 250px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .card-header {
        margin-top: 5px;
    }

    .vip {
        display: inline-block;
        background: gold;
        padding: 5px 10px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 10px;
    }

    .name {
        font-size: 20px;
        font-weight: bold;
        margin: 10px 0;
    }

    .age span {
        background: #13b13d;
        color: #fff;
        padding: 2px 6px;
        border-radius: 5px;
    }
</style>
</head>
<body>

<div class="container">
    <!-- LEFT section -->
    <div class="left">
        <h2>Update Variables</h2>

        <label>Name (String):</label>
        <input type="text" value="type here">

        <label>Age (Number):</label>
        <input type="number" value="type here">

        <label>VIP Status (Boolean):</label>
        <input type="checkbox" checked>

        <label>Card Color:</label>
        <input type="color" id color input="bedge">
    </div>

    <!-- RIGHT section -->
    <div class="right">
        <h2>Live DOM Output</h2>

        <div class="card">
            <div class="vip">Premium MEMBER</div>
            <div class="name">type here</div>
            <div class="age">type here: <span>00</span></div>
        </div>
    </div>
</div>

</body>
</html>
