<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Variables UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="bg-gray-100 flex items-center justify-center min-h-screen p-6">
        <div
            class="bg-sky-100 rounded-2xl shadow-sm border border-gray-200/50 max-w-4xl w-full p-12 md:p-16 flex flex-col md:flex-row gap-16 md:gap-24">
            <div class="flex-1 space-y-6">
                <h2 class="text-2xl font-bold text-gray-800 tracking-tight mb-8">
                    Update Variables
                </h2>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700">Name (String):</label>
                    <input type="text" value="Alex Walker"
                        class="w-full px-3 py-2 bg-transparent border border-gray-300 rounded-md shadow-inner focus:outline-none focus:ring-1 focus:ring-gray-400 text-gray-800" />
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700">Age (Number):</label>
                    <input type="number" value="28"
                        class="w-full px-3 py-2 bg-transparent border border-gray-300 rounded-md shadow-inner focus:outline-none focus:ring-1 focus:ring-gray-400 text-gray-800" />
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700">VIP Status (Boolean):</label>
                    <div class="pt-1">
                        <input type="checkbox" checked class="w-4 h-4 accent-gray-700 rounded cursor-pointer" />
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-gray-700">Card Color:</label>
                    <div
                        class="w-12 h-6 border border-gray-300 rounded bg-gray-200/50 flex items-center justify-center cursor-pointer">
                        <div class="w-4 h-2 bg-indigo-200"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col">
                <h2 class="text-2xl font-bold text-gray-800 tracking-tight mb-8">
                    Live DOM Output
                </h2>

                <div
                    class="border border-gray-800 rounded-2xl p-6 bg-transparent shadow-lg max-w-sm w-full relative flex flex-col justify-between min-h-[160px]">
                    <div>
                        <span
                            class="inline-block bg-[#fcd34d] text-[10px] font-black uppercase tracking-wider px-2 py-0.5 rounded-full text-gray-800 mb-4">
                            VIP Member
                        </span>
                    </div>

                    <div class="space-y-1">
                        <h3 class="text-xl font-bold text-gray-900">Alex Walker</h3>
                        <p class="text-gray-700 font-medium">
                            Age: <span class="font-normal">28</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <script>
            const nameInput = document.getElementById('nameInput');
            const ageInput = document.getElementById('ageInput');
            const submitBtn = document.getElementById('submitBtn');

            const outputCard = document.getElementById('outputCard');
            const displayName = document.getElementById('displayName');
            const displayAge = document.getElementById('displayAge');

            submitBtn.addEventListener('click'), () => {
                const enteredName = nameInput.value;
                const enteredAge = ageInput.value;
            }    
        </script>
</body>

</html>
