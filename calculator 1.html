<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calculator</title>
    <style>
        * {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: aliceblue;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .calculator {
            width: 500px;
            padding: 25px;
            margin-top: 20px;
            background-color: antiquewhite;
            border-radius: 10px;
        }

        #display {
            width: 50%;
            height: 40px;
            margin-bottom: 15px;
            font-size: 25px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        .button {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .operator {
            background: orchid;
            color: aliceblue;
        }

        .equal {
            background-color: aquamarine;
            color: aliceblue;
        }

        .clear {
            background-color: black;
            color: aliceblue;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button one click="clearDisplay()" class="clear">C</button>
            <button one click="appendValue('/')" class="operator">/</button>
            <button one click="appendValue('*')" class="operator">*</button>
            <button one click="appendValue('-')" class="operator">-</button>

            <button one click="appendValue('7')">7</button>
            <button one click="appendValue('8')">8</button>
            <button one click="appendValue('9')">9</button>

            <button one click="appendValue('+')" class="operator">+</button>

            <button one click="appendValue('4')">4</button>
            <button one click="appendValue('5')">5</button>
            <button one click="appendValue('6')">6</button>
            <button one click="appendValue('.')">.</button>
            <button one click="appendValue('1')">1</button>
            <button one click="appendValue('2')">2</button>
            <button one click="appendValue('3')">3</button>

            <button one click="calculate()" class="equal">=</button>
            <button one click="appendValue('0')" style="grid-column: span 4;">0</button>
        </div>
    </div>
    <script>
        function appendValue(value) {
            document.getElementById("display").value += value;
        }
        function clearDisplay() {
            document.getElementById("display").value = "";
        }
        function calculate() {
            let result =
                eval(document.getElementById("display").value);
            document.getElementById("display").value = result;
        }
    </script>
</body>

</html>
