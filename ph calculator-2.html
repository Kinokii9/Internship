<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #000;
            padding: 25px;
            border-radius: 30px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #display {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 45px;
            text-align: right;
            padding: 10px;
            outline: none;
            caret-color: #ff9500;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            background-color: #ff9500;
            color: white;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-grey {
            background-color: #a5a5a5;
            color: black;
        }

        .equal {
            grid-column: span 2;
            width: 100%;
            border-radius: 40px;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" value="0">

        <div class="buttons">
            <button class="btn-grey" onclick="press('C')">C</button>
            <button class="btn-grey" onclick="press('DEL')">⌫</button>
            <button class="btn-grey" onclick="press('(')">(</button>
            <button class="btn-grey" onclick="press(')')">)</button>
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">÷</button>
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">×</button>
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">-</button>
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button onclick="press('%')">%</button>
            <button onclick="press('+')">+</button>

            <button class="equal" onclick="press('=')">=</button>
        </div>
    </div>

    <script>
        function press(val) {
            let screen = document.getElementById("display");
            let current = screen.value;
            let lastChar = current.slice(-1);
            let operators = ['+', '-', '*', '/', '%'];
            let inputVal = val.toUpperCase();

            if (inputVal === 'C') {
                screen.value = "0";
            }
            else if (inputVal === 'DEL') {
                screen.value = current.length > 1 ? current.slice(0, -1) : "0";
            }
            else if (inputVal === '=') {
                calculate();
            }
            else if (operators.includes(val)) {
                if (operators.includes(lastChar)) {
                    screen.value = current.slice(0, -1) + val;
                } else {
                    screen.value += val;
                }
            }
            else {
                if (val === '.') {
                    let lastNumber = current.split(/[\+\-\*\/%]/).pop();
                    if (lastNumber.includes('.')) return;
                }

                if (screen.value === "0" && val !== '.') {
                    screen.value = val;
                } else {
                    screen.value += val;
                }
            }

        }


        function calculate() {
            let screen = document.getElementById("display");
            try {
                let expression = screen.value;

                if (expression.includes('/0')) {
                    screen.value = "Can't divide by 0";
                    return;
                }

                expression = expression.replace(/%/g, '/100');
                expression = expression.replace(/(\d)\(/g, '$1*(');
                expression = expression.replace(/\)(\d)/g, ')*$1');
                expression = expression.replace(/\)\(/g, ')*(');

                let result = eval(expression);

                switch (result) {
                    case Infinity:
                    case -Infinity:
                        screen.value = "Error";
                        break;
                    case undefined:
                        screen.value = "0";
                        break;
                    default:
                        screen.value = Number.isInteger(result) ? result : result.toFixed(2);
                        break;
                }
            } catch (e) {
                screen.value = "Invalid Format";
            }
        }
    </script>
</body>

</html>
