<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phone Calculator</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fffafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .calculator {
            background-color: #000;
            padding: 20px;
            border-radius: 30px;
            width: 340px;
        }

        #display {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 50px;
            text-align: right;
            padding: 10px;
            outline: none;
            caret-color: #ff9500;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            background-color: #ff9500;
            color: white;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .equal {
            grid-column: span 2;
            width: 100%;
            border-radius: 40px;
        }

        .btn-grey {
            background-color: #a5a5a5;
            color: black;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" value="0"/>

        <div class="buttons">
            <button class="btn-grey" onclick="press('C')">C</button>
            <button class="btn-grey" onclick="press('DEL')">⌫</button>
            <button class="btn-grey" onclick="press('%')">%</button>
            <button onclick="press('/')">÷</button>
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('*')">×</button>
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('-')">-</button>
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('+')">+</button>
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button class="equal" onclick="press('=')">=</button>
        </div>
    </div>

    <script>
        let screen = document.getElementById("display");

        function press(val) {
                let current = screen.value;
                let lastChar = current.slice(-1);
                let operators = ['+','-','*','/','%'];
            

            if (val === "C") {
                currentInput = "";
                screen.value = "0";
            } else if (val === "DEL") {
                currentInput = currentInput.slice(0, -1);
                screen.value = currentInput || "0";
            } else if (val === "=") {
                calculate();
            } else {
                if (currentInput === "" && val === "0") return;
                currentInput += val;
                screen.value = currentInput;
            }
        }

        function calculate() {
            let screen = document.getElementById("display");

            try {
                let result = eval(currentInput);

                switch (result) {
                    case Infinity:
                        screen.value = "Undefined";
                        currentInput = "";
                        break;
                    case undefined:
                        screen.value = "0";
                        currentInput = "";
                        break;
                    default:
                        screen.value = result;
                        currentInput = result.toString();
                        break;
                }
            } catch (err) {
                screen.value = "Undefined";
                currentInput = "";
            }
        }
    
    </script>
</body>

</html>
