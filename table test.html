<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="./gtr.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student table</title>
    <style>
        *{
            margin: auto;
            margin-top: 40px;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            padding: 30px;
            background-color: rgb(224, 232, 196);
        }
        table{
            width: 75%;
            height: 10%;
            background-color: rgb(106, 156, 200);
            border-collapse: collapse;
        }
        th, td{
            border: 2px solid black;
            padding: 15px;
            font-size: 27px;
        }
        td{
            font-size: 20px;
            font-weight: normal;
        }
        .name{
            text-align: left;
        }
        .marks{
            text-align: right;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th rowspan="2">No</th>
            <th rowspan="2">Student Name</th>
            <th rowspan="2">Gender</th>
            <th rowspan="2">Roll No.</th>
            <th colspan="3">Marks</th>
        </tr>

        <tr>
            <th>Myanmar</th>
            <th>English</th>
            <th>Maths</th>
        </tr>

        <tr>
            <td>1</td>
            <td class="name">Su Su</td>
            <td rowspan="2">Female</td>
            <td>5CS-32</td>
            <td class="marks">60</td>
            <td class="marks">75</td>
            <td class="marks">86</td>
        </tr>

        <tr>
            <td>2</td>
            <td class="name">Moe Moe</td>
            <td>5CS-33</td>
            <td class="marks">78</td>
            <td class="marks">86</td>
            <td class="marks">84</td>
        </tr>

        <tr>
            <td>3</td>
            <td class="name">Kyaw Kyaw</td>
            <td rowspan="3">Male</td>
            <td>5CS-34</td>
            <td class="marks">89</td>
            <td class="marks">43</td>
            <td class="marks">86</td>
        </tr>

        <tr>

            <td>4</td>
            <td class="name">Mg Mg</td>
            <td>5CS-35</td>
            <td class="marks">76</td>
            <td class="marks">75</td>
            <td class="marks">75</td>

        </tr>

         <tr>
            <td>5</td>
            <td class="name">Aung Aung</td>
            <td>5CS-36</td>
            <td class="marks">87</td>
            <td class="marks">75</td>
            <td class="marks">86</td>
        </tr>
            
    </table>
</body>
</html>
